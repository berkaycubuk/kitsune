version: 2

project_name: kitsune

before:
  hooks:
    - go mod tidy

builds:
  - id: kitsune
    main: ./cmd/kitsune
    binary: kitsune
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/berkaycubuk/kitsune/internal/version.Version={{ .Version }}

archives:
  - id: kitsune
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: berkaycubuk
    name: kitsune
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
